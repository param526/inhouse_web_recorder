# ===========================================
# Application Configuration
# ===========================================
# Values here serve as defaults.
# Environment variables override these values.
# ===========================================

# Server
server.port=4567

# Database
db.host=localhost
db.port=3306
db.name=recorder_db
db.user=root
db.password=
db.maxPoolSize=10
db.minIdle=2
db.connectionTimeout=30000
db.idleTimeout=600000
db.maxLifetime=1800000

# JWT Authentication
jwt.secret=default-jwt-secret-change-in-production-please
jwt.expirationMs=86400000

# Encryption
encryption.key=default-dev-key-change-in-production
